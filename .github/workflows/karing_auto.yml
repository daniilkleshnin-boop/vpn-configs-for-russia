name: 2-Hour Karing Sync

on:
  schedule:
    - cron: '0 */2 * * *' # Скрипт будет запускаться сам каждые 2 часа
  workflow_dispatch: # Кнопка для ручного запуска в любое время

permissions:
  contents: write

jobs:
  merge-proxies:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем репозиторий
        uses: actions/checkout@v4

      - name: Объединяем текстовые файлы
        run: |
          # Очищаем финальный файл перед записью
          > karing_final.txt
          
          # ВНИМАНИЕ: Замените имена файлов ниже на реальные имена из вашего репозитория!
          # Если файл всего один, оставьте только первую строчку.
          cat файл1.txt >> temp_proxies.txt
          cat файл2.txt >> temp_proxies.txt
          
          # Очищаем список: оставляем только рабочие прокси-ссылки, убираем пустые строки
          if [ -s temp_proxies.txt ]; then
            cat temp_proxies.txt | grep -E '^([a-zA-Z0-9_-]+)://' > karing_final.txt
            echo "Файл для Karing успешно создан!"
          else
            echo "Ошибка: исходные файлы пусты"
            exit 1
          fi

      - name: Сохраняем изменения в ваш репозиторий
        run: |
          git config --local user.email "github-actions[bot]@://github.com"
          git config --local user.name "github-actions[bot]"
          git add karing_final.txt
          git commit -m "Автообновление списка каждые 2 часа [skip ci]" || echo "Нет новых изменений"
          git push
