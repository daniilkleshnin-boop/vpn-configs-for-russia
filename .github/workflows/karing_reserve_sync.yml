name: 1-Hour Karing Reserve Mobile Sync

on:
  schedule:
    - cron: '15 * * * *' # Раз в час на 15-й минуте
  workflow_dispatch: # Кнопка для ручного запуска

permissions:
  contents: write # Даем полные права на перезапись репозитория!

jobs:
  sync-sort-reserve:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем твой репозиторий
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Установка сетевой утилиты netcat
        run: |
          sudo apt-get update
          sudo apt-get install -y netcat-openbsd

      - name: Скачиваем резервные прокси у igareck
        run: |
          curl -s "https://githubusercontent.com" -o raw_reserve.txt || touch raw_reserve.txt

      - name: Замер скорости и жесткая сортировка наверх
        run: |
          touch temp_raw.txt
          cat raw_reserve.txt > temp_raw.txt 2>/dev/null || true
          cat temp_raw.txt | grep -E '^([a-zA-Z0-9_-]+)://' > filtered_reserve.txt || touch filtered_reserve.txt
          
          touch timed_nodes.txt
          if [ -s filtered_reserve.txt ]; then
            while read -r line; do
              if [[ "$line" =~ @([^:]+):([0-9]+) ]]; then
                host="${BASH_REMATCH}"
                port="${BASH_REMATCH}"
                start_time=$(date +%s%N)
                if nc -z -w 2 "$host" "$port" 2>/dev/null; then
                  end_time=$(date +%s%N)
                  ping_ms=$(( (end_time - start_time) / 1000000 ))
                  echo "$ping_ms $line" >> timed_nodes.txt
                else
                  echo "9999 $line" >> timed_nodes.txt
                fi
              fi
            done < filtered_reserve.txt
          fi

          touch karing_reserve_final.txt
          if [ -s timed_nodes.txt ]; then
            sort -n timed_nodes.txt | cut -d' ' -f2- > karing_reserve_final.txt
            echo "Робот успешно отсортировал резервный список!"
          else
            cat filtered_reserve.txt > karing_reserve_final.txt
          fi

      - name: Жесткое принудительное сохранение файлов на сайт
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add karing_reserve_final.txt
          # Фиксируем изменения в любом случае
          git commit -m "Принудительное обновление резервных прокси" --allow-empty
          # Пробиваем защиту ветки и принудительно обновляем файлы на сайте!
          git push origin main --force
