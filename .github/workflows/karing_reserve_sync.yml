name: Karing Reserve Python Fast Sync

on:
  schedule:
    - cron: '15 * * * *' # Раз в час на 15-й минуте
  workflow_dispatch: # Кнопка для ручного запуска

permissions:
  contents: write # Права на запись файлов

jobs:
  sync-sort-reserve:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем твой репозиторий
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Скачивание, фильтрация и жесткая сортировка прокси
        run: |
          python -c "
          import urllib.request
          import socket
          import time
          import re
          import sys

          content = ''
          urls = [
              'https://githubusercontent.com',
              'https://githack.com'
          ]

          print('[+] Скачиваю оригинальный файл прокси...')
          for url in urls:
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=10) as response:
                      content = response.read().decode('utf-8', errors='ignore')
                  if content and '://' in content:
                      break
              except Exception:
                  continue

          lines = content.split('\n')
          valid_nodes = []
          timed_nodes = []

          # ХИРУРГИЧЕСКАЯ ФИЛЬТРАЦИЯ: Забираем ТОЛЬКО чистые ссылки (без текста, смайликов и мусора)
          for line in lines:
              line = line.strip()
              # Проверяем, что строка начинается строго с прокси-протокола
              if line and any(line.startswith(proto) for proto in ['ss://', 'vless://', 'vmess://', 'trojan://', 'tuic://', 'hysteria2://']):
                  valid_nodes.append(line)

          print(f'[+] Найдено чистых прокси: {len(valid_nodes)}')

          if len(valid_nodes) == 0:
              sys.exit(1)

          # Скоростная проверка портов
          for node in valid_nodes:
              match = re.search(r'@([^:/]+):([0-9]+)', node)
              if match:
                  host = match.group(1)
                  port = int(match.group(2))
                  
                  start = time.perf_counter()
                  try:
                      sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                      sock.settimeout(1.0)
                      sock.connect((host, port))
                      sock.close()
                      
                      ping_ms = int((time.perf_counter() - start) * 1000)
                      timed_nodes.append((ping_ms, node))
                  except Exception:
                      timed_nodes.append((9999, node))
              else:
                  timed_nodes.append((9998, node))

          # Жесткая сортировка по пингу
          timed_nodes.sort(key=lambda x: x[0])

          # Записываем файл БЕЗ лишнего мусора, только чистые ссылки!
          if len(timed_nodes) > 0:
              with open('karing_reserve_final.txt', 'w', encoding='utf-8') as f:
                  for ping, node in timed_nodes:
                      f.write(node + '\n')
              print('✅ Файл успешно очищен и записан!')
          else:
              sys.exit(1)
          "

      - name: Жесткое принудительное сохранение файлов на сайт
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add karing_reserve_final.txt
          git commit -m "Очистка структуры файла подписки" --allow-empty
          git pull origin main --rebase
          git push origin main
