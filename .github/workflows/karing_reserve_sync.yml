name: Karing Reserve Python Fast Sync

on:
  schedule:
    - cron: '15 * * * *' # Раз в час на 15-й минуте
  workflow_dispatch: # Кнопка для ручного запуска

permissions:
  contents: write # Права на запись файлов

jobs:
  sync-sort-reserve:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем твой репозиторий
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Скачивание, декодирование и жесткая сортировка прокси
        run: |
          python -c "
          import urllib.request
          import socket
          import time
          import re
          import sys
          import base64

          content = ''
          urls = [
              'https://githubusercontent.com',
              'https://githack.com'
          ]

          print('[+] Скачиваю оригинальный файл прокси...')
          for url in urls:
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=10) as response:
                      content = response.read().decode('utf-8', errors='ignore').strip()
                  if content:
                      break
              except Exception:
                  continue

          if not content:
              print('❌ Ошибка: Не удалось скачать файл!')
              sys.exit(1)

          # ПРОВЕРКА И ДЕКОДИРОВАНИЕ BASE64
          # Если в тексте нет привычных признаков ссылок, но есть признаки Base64 шифра
          if '://' not in content and (len(content) % 4 == 0 or re.match('^[A-Za-z0-9+/=]+$', content)):
              print('[+] Обнаружен зашифрованный Base64 формат! Расшифровываю...')
              try:
                  # Добавляем падинг, если он потерялся при копировании
                  missing_padding = len(content) % 4
                  if missing_padding:
                      content += '=' * (4 - missing_padding)
                  decoded_bytes = base64.b64decode(content)
                  content = decoded_bytes.decode('utf-8', errors='ignore')
              except Exception as e:
                  print('⚠️ Ошибка декодирования Base64, пробую работать как с текстом:', e)

          lines = content.split('\n')
          valid_nodes = []
          timed_nodes = []

          # Ищем прокси-протоколы в расшифрованном тексте
          for line in lines:
              line = line.strip().replace('\r', '')
              if line and any(proto in line for proto in ['ss://', 'vless://', 'vmess://', 'trojan://', 'tuic://', 'hysteria2://']):
                  match_url = re.search(r'(ss|vless|vmess|trojan|tuic|hysteria2)://[^\s]+', line)
                  if match_url:
                      valid_nodes.append(match_url.group(0))

          print(f'[+] Успешно найдено и извлечено чистых прокси: {len(valid_nodes)}')

          if len(valid_nodes) == 0:
              print('❌ КРИТИЧЕСКАЯ ОШИБКА: Ссылки внутри файла отсутствуют! Отмена.')
              sys.exit(1)

          # Скоростная проверка портов через сокеты Python
          for node in valid_nodes:
              match = re.search(r'@([^:/]+):([0-9]+)', node)
              if match:
                  host = match.group(1)
                  port = int(match.group(2))
                  
                  start = time.perf_counter()
                  try:
                      sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                      sock.settimeout(1.0)
                      sock.connect((host, port))
                      sock.close()
                      
                      ping_ms = int((time.perf_counter() - start) * 1000)
                      timed_nodes.append((ping_ms, node))
                  except Exception:
                      timed_nodes.append((9999, node))
              else:
                  timed_nodes.append((9998, node))

          # Сортировка по пингу: быстрые наверх!
          timed_nodes.sort(key=lambda x: x)

          # Записываем готовый отсортированный файл подписки в открытом, чистом виде
          if len(timed_nodes) > 0:
              with open('karing_reserve_final.txt', 'w', encoding='utf-8') as f:
                  for ping, node in timed_nodes:
                      f.write(node + '\n')
              print(f'✅ Файл успешно расшифрован, отсортирован и сохранен! Количество: {len(timed_nodes)}')
          else:
              sys.exit(1)
          "

      - name: Жесткое принудительное сохранение файлов на сайт
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add karing_reserve_final.txt
          git commit -m "Автоматическое декодирование и сортировка Shadowsocks" --allow-empty
          git pull origin main --rebase
          git push origin main
