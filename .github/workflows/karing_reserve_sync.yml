name: Karing Reserve Python Fast Sync

on:
  schedule:
    - cron: '15 * * * *' # Раз в час на 15-й минуте
  workflow_dispatch: # Кнопка для ручного запуска

permissions:
  contents: write # Официальные права на запись файлов

jobs:
  sync-sort-reserve:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем твой репозиторий
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Скачивание, проверка скорости и жесткая сортировка прокси
        run: |
          python -c "
          import urllib.request
          import socket
          import time
          import re
          import sys

          content = ''
          # Список зеркал на случай падения DNS у GitHub
          urls = [
              'https://githubusercontent.com',
              'https://githack.com',
              'https://jsdelivr.net'
          ]

          print('[+] Пытаюсь скачать оригинальный файл прокси через зеркала...')
          for url in urls:
              try:
                  req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                  with urllib.request.urlopen(req, timeout=10) as response:
                      content = response.read().decode('utf-8', errors='ignore')
                  if content and '://' in content:
                      print(f'✅ Успешно скачано через: {url}')
                      break
              except Exception as e:
                  print(f'⚠️ Зеркало выдало сбой, пробую следующее... ({e})')

          lines = content.split('\n')
          valid_nodes = []
          timed_nodes = []

          for line in lines:
              line = line.strip()
              if line and '://' in line:
                  valid_nodes.append(line)

          print(f'[+] Найдено {len(valid_nodes)} прокси для проверки.')

          if len(valid_nodes) == 0:
              print('❌ КРИТИЧЕСКАЯ ОШИБКА: Не удалось получить прокси ни через одно зеркало. Отмена записи!')
              sys.exit(1)

          # Скоростная проверка портов через сокеты Python
          for node in valid_nodes:
              match = re.search(r'@([^:/]+):([0-9]+)', node)
              if match:
                  host = match.group(1)
                  port = int(match.group(2))
                  
                  start = time.perf_counter()
                  try:
                      sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                      sock.settimeout(1.2)
                      sock.connect((host, port))
                      sock.close()
                      
                      ping_ms = int((time.perf_counter() - start) * 1000)
                      timed_nodes.append((ping_ms, node))
                  except Exception:
                      timed_nodes.append((9999, node))
              else:
                  timed_nodes.append((9998, node))

          # Жесткая сортировка по пингу: быстрые — строго наверх!
          timed_nodes.sort(key=lambda x: x[0])

          # ЗАЩИТА: Записываем файл только если в нем реально есть проверенные сервера!
          if len(timed_nodes) > 0:
              with open('karing_reserve_final.txt', 'w', encoding='utf-8') as f:
                  for ping, node in timed_nodes:
                      f.write(node + '\n')
              print('✅ Резервный список успешно отсортировал и записал серверов:', len(timed_nodes))
          else:
              print('❌ Ошибка: Список пуст, отмена перезаписи файла!')
              sys.exit(1)
          "

      - name: Жесткое принудительное сохранение файлов на сайт
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add karing_reserve_final.txt
          git commit -m "Ультимативное обновление резервных прокси через Python" --allow-empty
          git pull origin main --rebase
          git push origin main
