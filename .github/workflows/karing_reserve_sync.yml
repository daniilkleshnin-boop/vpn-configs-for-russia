name: Karing Reserve Python Fast Sync

on:
  schedule:
    - cron: '15 * * * *' # Раз в час на 15-й минуте
  workflow_dispatch: # Кнопка для ручного запуска

permissions:
  contents: write # Права на запись файлов

jobs:
  sync-sort-reserve:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем твой репозиторий
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Скачивание через неубиваемые зеркала и сортировка прокси
        run: |
          python -c "
          import urllib.request
          import socket
          import time
          import re
          import sys

          # Карты резервных зеркал jsDelivr и Fastly, которые работают ВСЕГДА
          files_to_download = [
              {
                  'name': 'Shadowsocks_RUS.txt',
                  'urls': [
                      'https://jsdelivr.net',
                      'https://jsdelivr.net'
                  ]
              },
              {
                  'name': 'Hysteria2_RUS.txt',
                  'urls': [
                      'https://jsdelivr.net',
                      'https://jsdelivr.net'
                  ]
              },
              {
                  'name': 'Vmess_RUS.txt',
                  'urls': [
                      'https://jsdelivr.net',
                      'https://jsdelivr.net'
                  ]
              }
          ]

          raw_content = ''
          print('[+] Скачиваю три новых файла прокси через независимые зеркала CDN...')

          for item in files_to_download:
              file_success = False
              for url in item['urls']:
                  try:
                      req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                      with urllib.request.urlopen(req, timeout=12) as response:
                          file_text = response.read().decode('utf-8', errors='ignore')
                          if file_text and '://' in file_text:
                              raw_content += '\n' + file_text
                              print(f'✅ Успешно скачан файл: {item[\"name\"]} через зеркало!')
                              file_success = True
                              break
                  except Exception as e:
                      print(f'⚠️ Зеркало выдало сбой для {item[\"name\"]}, пробуем дубликат... ({e})')
              if not file_success:
                  print(f'❌ Не удалось скачать файл {item[\"name\"]} ни через одно CDN-зеркало.')

          lines = raw_content.split('\n')
          valid_nodes = []
          timed_nodes = []

          # Извлекаем только чистые ссылки прокси
          for line in lines:
              line = line.strip().replace('\r', '')
              if line and any(proto in line for proto in ['ss://', 'vless://', 'vmess://', 'trojan://', 'tuic://', 'hysteria2://']):
                  match_url = re.search(r'(ss|vless|vmess|trojan|tuic|hysteria2)://[^\s]+', line)
                  if match_url:
                      valid_nodes.append(match_url.group(0))

          # Убираем дубликаты
          valid_nodes = list(set(valid_nodes))
          print(f'[+] Всего уникальных прокси из зеркал найдено: {len(valid_nodes)}')

          if len(valid_nodes) == 0:
              print('❌ КРИТИЧЕСКАЯ ОШИБКА: Все зеркала CDN вернули пустоту! Отмена записи.')
              sys.exit(1)

          # Скоростная проверка портов через сокеты Python
          for node in valid_nodes:
              match = re.search(r'@([^:/]+):([0-9]+)', node)
              if match:
                  host = match.group(1)
                  port = int(match.group(2))
                  
                  start = time.perf_counter()
                  try:
                      sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                      sock.settimeout(1.0)
                      sock.connect((host, port))
                      sock.close()
                      
                      ping_ms = int((time.perf_counter() - start) * 1000)
                      timed_nodes.append((ping_ms, node))
                  except Exception:
                      timed_nodes.append((9999, node))
              else:
                  timed_nodes.append((9998, node))

          # Сортировка по пингу: самые шустрые наверх!
          timed_nodes.sort(key=lambda x: x)

          # Записываем готовый чистый список подписки
          if len(timed_nodes) > 0:
              with open('karing_reserve_final.txt', 'w', encoding='utf-8') as f:
                  for ping, node in timed_nodes:
                      f.write(node + '\n')
              print(f'✅ Резервный файл успешно собран! Количество живых серверов: {len(timed_nodes)}')
          else:
              sys.exit(1)
          "

      - name: Жесткое принудительное сохранение файлов на сайт
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add karing_reserve_final.txt
          git commit -m "Сборка микса Shadowsocks через неубиваемые зеркала CDN" --allow-empty
          git pull origin main --rebase
          git push origin main
