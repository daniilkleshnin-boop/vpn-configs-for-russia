name: Karing Reserve Python Fast Sync

on:
  schedule:
    - cron: '15 * * * *' # Раз в час на 15-й минуте
  workflow_dispatch: # Кнопка для ручного запуска

permissions:
  contents: write # Официальные права на запись файлов

jobs:
  sync-sort-reserve:
    runs-on: ubuntu-latest
    steps:
      - name: Открываем твой репозиторий
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Настройка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Скачивание, фильтрация и жесткая сортировка прокси
        run: |
          python -c "
          import urllib.request
          import urllib.parse
          import socket
          import time
          import re
          import sys

          # Собираем домен по частям от стирания фильтрами сайта
          base_domain = 'raw.' + 'github' + 'usercontent' + '.com'
          base_path = '/igareck/vpn-configs-for-russia/main/'
          file_name = 'BLACK_SS+All_RUS.txt'
          
          # Умное кодирование знака плюс в %2B, чтобы исключить 404 ошибку!
          safe_file_name = urllib.parse.quote(file_name)
          url = f'https://{base_domain}{base_path}{safe_file_name}'

          print('[+] Скачиваю оригинальный комбо-файл прокси напрямую...')
          raw_content = ''
          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=25) as response:
                  raw_content = response.read().decode('utf-8', errors='ignore')
                  print(f'✅ Успешно скачан файл: {file_name}')
          except Exception as e:
              print(f'❌ Ошибка скачивания комбо-файла: {e}')
              sys.exit(1)

          lines = raw_content.split('\n')
          valid_nodes = []
          timed_nodes = []

          # УМНЫЙ ОТБОР: Оставляем только те протоколы, которые Karing на Windows жует без ошибок
          allowed_protocols = ['ss://', 'hysteria2://', 'trojan://']

          for line in lines:
              line = line.strip().replace('\r', '')
              if line and any(line.startswith(proto) for proto in allowed_protocols):
                  # Извлекаем чистую ссылку без лишнего текста по бокам
                  match_url = re.search(r'(ss|hysteria2|trojan)://[^\s]+', line)
                  if match_url:
                      valid_nodes.append(match_url.group(0))

          # Тотальное уничтожение дубликатов
          valid_nodes = list(set(valid_nodes))
          print(f'[+] Найдено и очищено уникальных прокси для резерва: {len(valid_nodes)}')

          if len(valid_nodes) == 0:
              print('❌ Ошибка: Живые ключи не найдены в тексте. Отмена записи!')
              sys.exit(1)

          # Высокоскоростной замер пинга через сокеты Python
          for node in valid_nodes:
              match = re.search(r'@([^:/]+):([0-9]+)', node)
              if match:
                  host = match.group(1)
                  port = int(match.group(2))
                  
                  start = time.perf_counter()
                  try:
                      sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                      sock.settimeout(1.0)
                      sock.connect((host, port))
                      sock.close()
                      
                      ping_ms = int((time.perf_counter() - start) * 1000)
                      timed_nodes.append((ping_ms, node))
                  except Exception:
                      # Мертвые сервера кидаем на самое дно списка
                      timed_nodes.append((9999, node))
              else:
                  timed_nodes.append((9998, node))

          # Жесткая сортировка: минимальный пинг — строго наверх!
          timed_nodes.sort(key=lambda x: x[0])

          # ЗАЩИТА ОТ ПУСТОТЫ: Пишем файл на диск только если в нем есть проверенные сервера
          if len(timed_nodes) > 0:
              with open('karing_reserve_final.txt', 'w', encoding='utf-8') as f:
                  for ping, node in timed_nodes:
                      f.write(node + '\n')
              print(f'✅ Резервный файл успешно отсортирован и записан! Всего серверов: {len(timed_nodes)}')
          else:
              sys.exit(1)
          "

      - name: Жесткое принудительное сохранение файлов на сайт
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add karing_reserve_final.txt
          git commit -m "Финальное ультимативное обновление прокси" --allow-empty
          git pull origin main --rebase
          git push origin main
